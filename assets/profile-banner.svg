      <stop stop-color="#F0FDFF"/>
      <stop offset="0.56" stop-color="#CFFAFE"/>
      <stop offset="1" stop-color="#A5F3FC"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(196 106) rotate(46.7) scale(244 284)">
      <stop stop-color="#67E8F9" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0"/>
