<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jerry Yushao Chen profile banner</title>
  <desc id="desc">Abstract banner with a cyan tetrahedron-inspired four-pillar motif, using single, double, and dashed bond styles to evoke a Kitaev-like structure around physics, software, numerics, and algorithms or architectures.</desc>
  <defs>
